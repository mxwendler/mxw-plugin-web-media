[mxw_plugin]                            ; must be here
plugin_version = 1                      ; must be V1
plugin_script_language = Python         ; must be Python
plugin_menu_level = development         ; disabled->invisible, development->in debug builds
plugin_media_scheme = web               ; media addressed as "web://<url>"
plugin_media_create_uri = web://https://mxwendler.net   ; media created by the 'Create' button
plugin_menu_parent = Media
plugin_menu_name = Web Page
plugin_grid_name = Web
plugin_tooltip = Renders a live web page into a media surface. Address: web://https://mxwendler.net
